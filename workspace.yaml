# cft-workspace manifest
#
# Lists every HMCTS repo this workspace pulls in. Format:
#
#   repos:
#     <local-path>:
#       url: <org>/<repo>      # required; cloned via git@github.com:<url>.git
#       ref: <branch>          # optional; defaults to the repo's default branch
#       depth: <int>           # optional; 0 = full clone (default)
#
# All clones use SSH. Run scripts/bootstrap to clone missing entries; scripts/sync
# to fast-forward existing clones; scripts/add-repo to append a new entry safely.

defaults:
  org: hmcts
  ref: default      # use the repo's default branch unless overridden
  depth: 0

repos:

  # ─── apps/ccd — Core Case Data platform ──────────────────────────────────
  apps/ccd/ccd-data-store-api:           { url: hmcts/ccd-data-store-api }
