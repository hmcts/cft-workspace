# Used by scripts/doc-drift and the /check-doc-drift skill to detect upstream
# changes that need porting forward.
#
# Each entry maps a target docs/ page to the upstream source file and the
# upstream commit SHA the target was last reconciled with. To refresh a page:
#   1. Re-run scripts/port-page on the (new) upstream source
#   2. Hand-fix any link/image/structure churn
#   3. Bump the entry's synced_sha to the new upstream HEAD
#
# Drop list at the bottom records upstream paths we've decided NOT to port
# (and why) so /check-doc-drift doesn't keep flagging them as "new upstream".

